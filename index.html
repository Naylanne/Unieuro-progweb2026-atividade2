<html>

<head>
<meta charset="UTF-8">
<title>Cadastro</title>

</head>

<body>
<form>

<table align="center" border="0" cellspacing="10" width="600">
<tr>
<td colspan="3">
<font size="5" face="Arial" align="center"><h2>Ficha de Inscrição</h2></font>
</td>
</tr>

<tr>
<td colspan="3"> <font size="3" face="Arial"> Nome do candidato:
<input type="text" size="57">
</td>
</tr>

<tr>
<td colspan="3"> <font size="3" face="Arial"> Endereço:
<input type="text" size="68">
</td>
</tr>

<tr>
<td> <font size="3" face="Arial"> CEP:
<input type="text" size="20">
</td>

<td align="justify"> <font size="3" face="Arial"> Cidade:
<select>
<option>-- Cidade --</option>
</select>
</td>

<td> <font size="3" face="Arial"> UF:
<select>
<option>-- UF --</option>
</select>
</td>
</tr>

<tr>
<td colspan="3"> <font size="3" face="Arial"> Telefone:
<input type="text" size="19">
<input type="text" size="19">
<input type="text" size="19">
</td>
</tr>

<tr>
<td> <font size="3" face="Arial"> RG:
<input type="text" size="8">
</td>

<td> <font size="3" face="Arial"> CPF:
<input type="text" size="10">
</td>

<td> <font size="3" face="Arial"> Sexo:
<input type="radio" name="sexo"> Mas.
<input type="radio" name="sexo"> Fem.
</td>
</tr>

<tr>
<td> <font size="3" face="Arial"> Escolaridade:
<select>
<option>-- Selecione --</option>
</select>
</td>

<td colspan="3"> <font size="3" face="Arial"> Email:
<input type="email" size="39">
</td>
</tr>

<tr>
<td> <font size="3" face="Arial"> Curso:
<select>
<option>-- Selecione --</option>
</select>
</td>
<td colspan="2"> <font size="3" face="Arial"> Senha de acompanhamento:
<input type="password" size="15">
</td>
</tr>

<tr>
<td colspan="3" align="center" class="botao"> <font size="3" face="Arial">
<br>
<input type="submit" value="CADASTRAR">
</td>
</tr>

</table>

</form>

</body>
</html>
