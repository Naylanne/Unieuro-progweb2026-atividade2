<html>

<head>
<meta charset="UTF-8">
<title>Ficha de Inscrição</title>

<form>
   <font size="2" face="Verdana"><h2 align="center">Ficha de Inscrição</h2></font>

</head>

<body>

<table align="center" border="0">

<tr>
<td>Nome do candidato:</td>
<td colspan="3">
<input type="text" size="60">
</td>
</tr>

<tr>
<td>Endereço:</td>
<td colspan="3">
<input type="text" size="60">
</td>
</tr>

<tr>
<td>CEP:</td>
<td><input type="text"></td>

<td>Cidade:</td>
<td>
<select>
<option>-- Cidade --</option>
</select>
</td>

<td>UF:</td>
<td>
<select>
<option>-- UF --</option>
</select>
</td>
</tr>

<tr>
<td>Telefone:</td>
<td>
<input type="text" size="4">
<input type="text" size="4">
<input type="text" size="4">
</td>
</tr>

<tr>
<td>RG:</td>
<td><input type="text"></td>

<td>CPF:</td>
<td><input type="text"></td>

<td>Sexo:</td>
<td>
<input type="radio" name="sexo"> Mas.
<input type="radio" name="sexo"> Fem.
</td>
</tr>

<tr>
<td>Escolaridade:</td>
<td>
<select>
<option>-- Selecione --</option>
</select>
</td>

<td>Email:</td>
<td colspan="2">
<input type="email" size="60">
</td>
</tr>

<tr>
<td>Curso:</td>
<td>
<select>
<option>-- Selecione --</option>
</select>
</td>
<td>Senha de acompanhamento:</td>
<td>
<input type="password">
</td>
</tr>

<tr>
<td colspan="4" align="center" class="botao">
<br>
<input type="submit" value="CADASTRAR">
</td>
</tr>

</table>

</form>

</body>
</html>
